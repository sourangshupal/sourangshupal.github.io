project:
  type: website
  output-dir: docs

website:
  description: "AI, Machine Learning, and Modern Tech Insights"
  site-url: https://sourangshupal.github.io
  title: "Sourangshu Pal"
  navbar:
    background: dark
    left:
      - text: "Home"
        href: index.qmd
      - text: "Posts"
        href: posts.qmd
      - text: "About"
        href: about.qmd
    right:
      - icon: github
        href: https://github.com/sourangshupal
        aria-label: GitHub
    search: true
  page-footer:
    background: dark
    left: "© 2025 Sourangshu Pal"
    center: "AI, Machine Learning & Modern Tech"
    right:
      - icon: github
        href: https://github.com/sourangshupal
        aria-label: GitHub
  open-graph: true
  twitter-card: true

format:
  html:
    theme: darkly
    css: styles.css
    toc: true
    toc-depth: 3
    code-copy: true
    code-overflow: wrap
    smooth-scroll: true
    link-external-newwindow: true
    link-external-icon: false
    highlight-style: github-dark
